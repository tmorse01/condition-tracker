[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @condition-tracker/api... build"

[deploy]
startCommand = "if [ -f dist/apps/api/src/index.js ]; then node dist/apps/api/src/index.js; else node apps/api/dist/apps/api/src/index.js; fi"
healthcheckPath = "/health"
